services:
  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    environment:
      - DOCKER_API_VERSION=1.54
    networks:
      - web

  hermes:
    build: ./hermes
    restart: unless-stopped
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - hermes-data:/root/.hermes
      - user-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`team-dereve.coachlibre.com`) && PathPrefix(`/hermes`)"
      - "traefik.http.routers.hermes.entrypoints=web"
      - "traefik.http.routers.hermes.priority=100"
      - "traefik.http.middlewares.hermes-strip.stripprefix.prefixes=/hermes"
      - "traefik.http.routers.hermes.middlewares=hermes-strip"
      - "traefik.http.services.hermes.loadbalancer.server.port=8080"
    networks:
      - web

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      - HERMES_API_URL=http://hermes:8080
      - NEXT_PUBLIC_HERMES_API_URL=https://team-dereve.coachlibre.com/hermes
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - AUTH_TRUST_HOST=true
      - AUTH_URL=https://team-dereve.coachlibre.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`team-dereve.coachlibre.com`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - web

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - hermes
    environment:
      - OPENAI_API_BASE_URLS=http://hermes:8080/v1;https://openrouter.ai/api/v1
      - OPENAI_API_KEYS=unused;${OPENROUTER_API_KEY}
      - WEBUI_AUTH=true
      - ENABLE_OPENAI_API=true
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=https://api.openai.com/v1
      - AUDIO_STT_OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - AUDIO_TTS_ENGINE=elevenlabs
      - AUDIO_TTS_ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
    volumes:
      - owui-data:/app/backend/data
    networks:
      - web

volumes:
  hermes-data:
  user-data:
  owui-data:

networks:
  web:
    driver: bridge
