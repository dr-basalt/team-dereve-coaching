services:
  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    environment:
      - DOCKER_API_VERSION=1.54
    networks:
      - web

  frontend:
    build: ./frontend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HERMES_API_URL=http://host.docker.internal:8080
      - HERMES_API_KEY=hermes-coaching-2026
      - NEXT_PUBLIC_HERMES_API_URL=https://team-dereve.coachlibre.com/hermes
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - AUTH_TRUST_HOST=true
      - AUTH_URL=https://team-dereve.coachlibre.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`team-dereve.coachlibre.com`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - web

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_BASE_URLS=http://host.docker.internal:8080/v1;https://openrouter.ai/api/v1
      - OPENAI_API_KEYS=hermes-coaching-2026;${OPENROUTER_API_KEY}
      - WEBUI_AUTH=true
      - ENABLE_OPENAI_API=true
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=https://api.openai.com/v1
      - AUDIO_STT_OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - AUDIO_TTS_ENGINE=elevenlabs
      - AUDIO_TTS_ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
    volumes:
      - owui-data:/app/backend/data
    networks:
      - web

volumes:
  owui-data:

networks:
  web:
    driver: bridge
